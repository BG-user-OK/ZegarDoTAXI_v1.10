<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Tarcza czasu pracy</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Tarcza">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" href="icon-192.png">

  <style>
    :root{
      --bg:#000000;
      --dot:#d7d7d7;
      --dot-big:#ececec;
      --txt:#f4f4f4;
      --version:#3b3b3b;

      --hand-hour:#e8e8e8;
      --hand-minute:#b9b9b9;
      --hand-outline:rgba(0,0,0,.85);
      --dial-number:#8a8a8a;

      --work-green:#38c866;
      --no-exercise-red:#ff3838;
      --overtime-orange:#ff9a1f;
      --exercise:#e5871f;
      --break-cut:#000000;
      --forecast:#44df73;

      --btn-work-off-1:#0d3f18;
      --btn-work-off-2:#07250f;
      --btn-work-on-1:#2ac158;
      --btn-work-on-2:#17873a;
      --btn-work-over-1:#ffa335;
      --btn-work-over-2:#c96a0a;

      --btn-ex-off-1:#75410a;
      --btn-ex-off-2:#492805;
      --btn-ex-on-1:#ffaa3f;
      --btn-ex-on-2:#d87210;
      --btn-ex-alert-1:#d12727;
      --btn-ex-alert-2:#8f1717;
      --btn-ex-blink-1:#ff5a47;
      --btn-ex-blink-2:#cd2313;

      --btn-break-off-1:#72600b;
      --btn-break-off-2:#463a06;
      --btn-break-on-1:#ffe84d;
      --btn-break-on-2:#d7bc05;

      --btn-pot-off-1:#2a2a2a;
      --btn-pot-off-2:#1a1a1a;

      --btn-money-1:#f4d87a;
      --btn-money-2:#c9a03d;
      --btn-money-text:#5c3e08;

      --work-text-green:#0f431c;
      --work-text-orange:#4a2600;
      --exercise-text:#ffd39a;
      --exercise-text-alert:#ffd6d6;
      --break-text:#fff0a6;

      --red:#b11919;
      --red-dark:#5e0e0e;
      --ok:#188439;
      --ok-dark:#0f5f28;
    }

    *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
    button, .btn, .ok-btn, .cancel-btn, .delete-btn, .arrow-btn, .prov-btn, .counter-edit, .note-sticker, .keypad button {
      touch-action: manipulation;
    }
    html,body{ margin:0; padding:0; width:100%; height:100%; background:#000; color:var(--txt); font-family:Arial, Helvetica, sans-serif; overflow:hidden; }
    body{ display:flex; align-items:center; justify-content:center; }

    .app{
      width:100%; height:100%;
      display:flex; flex-direction:column;
      align-items:center; justify-content:space-between;
      padding:6px 8px 30px;
      gap:6px; position:relative; background:#000;
    }

    .notes-bar{
      width:100%; min-height:64px;
      display:flex; align-items:center; gap:2px;
      padding:4px 60px 4px 6px;
      flex-wrap:wrap;
    }
    .note-sticker{
      flex:0 0 auto;
      width:var(--note-size, 68px);
      height:var(--note-size, 60px);
      padding:0 4px;
      border-radius:8px 8px 14px 8px;
      display:inline-flex; align-items:center; justify-content:center;
      font-size:calc(var(--note-size, 60px) * 0.5);
      font-weight:800;
      box-shadow:0 2px 4px rgba(0,0,0,.5);
      border:none; cursor:pointer;
      transition:opacity .2s, background .2s;
    }
    .note-sticker.empty{
      background:#1a1a1a;
      color:#5a5a3a;
      font-size:calc(var(--note-size, 60px) * 0.45);
    }
    .note-sticker.filled{
      background:#f4d847;
      color:#3a2c00;
    }
    .note-sticker.alarm-blink{
      background:#ff3838;
      color:#fff;
    }
    .note-sticker:active{ transform:scale(.96); }

    .clock-wrap{
      width:min(94vw, 64vh); aspect-ratio:1/1;
      position:relative; display:flex; align-items:center; justify-content:center;
    }
    .clock-svg{ width:100%; height:100%; display:block; }
    .clock-center{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
    }
    .clock-face{ width:80%; height:80%; border-radius:50%; position:relative; }
    .number{
      position:absolute; left:50%; top:50%;
      transform:translate(-50%,-50%);
      color:var(--dial-number); font-weight:900;
      font-size:clamp(45px, 12vw, 84px);
      line-height:1; letter-spacing:-1.2px;
      transition:color .3s ease, text-shadow .3s ease;
    }
    .number.active{
      color:#ffffff;
      text-shadow:
        0 0 8px rgba(255,255,255,.85),
        0 0 16px rgba(255,255,255,.6),
        0 0 24px rgba(180,255,200,.4);
    }

    .controls{
      width:min(96vw, 620px);
      display:grid; grid-template-columns:repeat(3, 1fr);
      grid-auto-rows:1fr; gap:6px; align-items:stretch;
    }

    /* Data pod zegarem (zmiana 11) */
    .date-display{
      width:100%;
      text-align:center;
      font-size:clamp(27px, 7.2vw, 40px);
      font-weight:800;
      color:var(--dial-number);
      letter-spacing:.5px;
      padding:6px 0;
      line-height:1.05;
    }

    /* Bateria w prawym górnym rogu (zmiana 13) */
    .battery-indicator{
      position:fixed;
      top:6px; right:8px;
      z-index:20;
      padding:3px 9px;
      border:1.5px solid #2ecc71;
      border-radius:4px;
      color:#2ecc71;
      font-size:14px;
      font-weight:800;
      letter-spacing:.3px;
      background:rgba(0,0,0,.4);
      min-width:48px;
      text-align:center;
      pointer-events:none;
    }
    .battery-indicator::after{
      content:'';
      position:absolute;
      top:50%;
      right:-5px;
      transform:translateY(-50%);
      width:3px; height:9px;
      background:#2ecc71;
      border-radius:0 2px 2px 0;
    }
    .battery-indicator.low{
      color:#ff3838;
      border-color:#ff3838;
    }
    .battery-indicator.low::after{
      background:#ff3838;
    }
    .btn{
      position:relative; border:none; border-radius:16px;
      aspect-ratio:1/1; min-height:84px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08),
                  inset 0 -12px 16px rgba(0,0,0,.34),
                  0 0 0 1px rgba(0,0,0,.55);
      color:#fff; overflow:hidden;
      appearance:none; -webkit-appearance:none; background:#111;
    }
    .btn:active{ transform:scale(.985); }
    .btn.empty-slot{ background:#0a0a0a; box-shadow:inset 0 0 0 1px #1a1a1a; pointer-events:none; opacity:.3; }

    /* === v1.12: long-press progress ring === */
    .btn .lp-ring{
      position:absolute; inset:0;
      border-radius:16px;
      pointer-events:none;
      z-index:6;
      opacity:0;
      box-shadow:inset 0 0 0 0 rgba(255,255,255,0.85);
      transition:opacity .15s ease;
    }
    .btn.lp-active .lp-ring{
      opacity:1;
      animation:lpFill 3s linear forwards;
    }
    @keyframes lpFill{
      0%   { box-shadow:inset 0 0 0 0px rgba(80,200,255,0.0); }
      30%  { box-shadow:inset 0 0 0 3px rgba(80,200,255,0.55); }
      60%  { box-shadow:inset 0 0 0 5px rgba(120,220,255,0.75); }
      100% { box-shadow:inset 0 0 0 8px rgba(255,255,255,0.95); }
    }

    /* === v1.12: edit-mini przekształcony w nieklikalną etykietę "✎ 3s" === */
    .edit-hint{
      position:absolute; top:6px; right:6px;
      font-size:11px; font-weight:800;
      color:rgba(255,255,255,.55);
      background:rgba(0,0,0,.28);
      padding:2px 6px;
      border-radius:6px;
      z-index:5;
      pointer-events:none;
      letter-spacing:.5px;
    }

    /* === v1.12: przycisk START/STOP - podział pionowy === */
    .work-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-columns:1.2fr 1fr;
      z-index:2;
      pointer-events:none;
    }
    .work-left{
      display:flex; flex-direction:column;
      justify-content:space-between;
      padding:8px 6px 8px 10px;
    }
    .work-time-top{
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.95);
      letter-spacing:-.5px;
      text-shadow:0 1px 0 rgba(0,0,0,.3);
    }
    .work-time-bot{
      font-size:clamp(16px, 4.2vw, 22px);
      font-weight:900;
      color:rgba(255,255,255,.85);
      letter-spacing:-.5px;
    }
    .work-icon-row{
      display:flex; align-items:center;
      gap:4px;
      font-size:18px;
      color:rgba(255,255,255,.85);
    }
    /* Rolka odhaczająca godziny */
    .work-right{
      display:flex; align-items:center; justify-content:center;
      padding:6px 6px 6px 0;
      position:relative;
    }
    .work-roller{
      position:absolute;
      top:50%; left:6%; right:6%;
      transform:translateY(-50%);
      height:80%;
      background:rgba(0,0,0,.55);
      border-radius:8px;
      box-shadow:inset 0 0 0 1px rgba(56,200,102,.22),
                 inset 0 0 10px rgba(0,0,0,.7);
      overflow:hidden;
      -webkit-mask-image:linear-gradient(180deg,
        transparent 0%, rgba(0,0,0,.7) 12%,
        black 28%, black 72%,
        rgba(0,0,0,.7) 88%, transparent 100%);
      mask-image:linear-gradient(180deg,
        transparent 0%, rgba(0,0,0,.7) 12%,
        black 28%, black 72%,
        rgba(0,0,0,.7) 88%, transparent 100%);
    }
    .work-roller-inner{
      display:flex; flex-direction:column;
      align-items:center;
      position:absolute;
      top:0; left:0; right:0;
      transition:transform 0.6s ease;
      will-change:transform;
    }
    .work-roller-digit{
      width:100%;
      flex:0 0 auto;
      display:flex; align-items:center; justify-content:center;
      font-weight:900;
      color:#f4ffe8;
      text-shadow:0 1px 0 rgba(0,0,0,.5);
      border-bottom:2.5px solid rgba(88,232,120,.55);
      box-sizing:border-box;
      /* font-size i height ustawia JS dynamicznie */
    }
    /* znaczniki na środku rolki - lewy i prawy */
    .work-roller-mark-left,
    .work-roller-mark-right{
      position:absolute;
      top:50%;
      transform:translateY(-50%);
      width:0; height:0;
      border-style:solid;
      z-index:10;
      pointer-events:none;
      filter:drop-shadow(0 0 3px rgba(88,232,120,.85));
    }
    .work-roller-mark-left{
      left:-1px;
      border-width:5px 0 5px 8px;
      border-color:transparent transparent transparent #58e878;
    }
    .work-roller-mark-right{
      right:-1px;
      border-width:5px 8px 5px 0;
      border-color:transparent #58e878 transparent transparent;
    }

    /* === v1.12: przycisk obrotów - dwa banknoty (góra/dół) === */
    .money-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    .money-split{
      position:absolute; inset:0;
      display:grid;
      grid-template-rows:1fr 1fr;
      gap:0;
      z-index:2;
      pointer-events:none;
    }
    .money-cell{
      position:relative;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      overflow:hidden;
      border-radius:0;
    }
    .money-cell.empty{
      background-image:none !important;
    }
    .money-cell-text{
      display:inline-block;
      width:auto;
      font-size:clamp(28px, 9vw, 48px);
      font-weight:900;
      text-align:center;
      line-height:1;
      padding:0;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
      /* offsety: --note-tx ustawia per-banknot (poziomo), górny dodatkowo dostaje shift w lewo */
      transform:translate(calc(var(--note-tx, 0%) + var(--row-shift, 0%)), var(--note-ty, 0%));
    }
    /* Kolory liczb - rozjaśnione, w odcieniu banknotu, z delikatną poświatą */
    .money-cell.note-50  .money-cell-text{
      color:#3870c8;          /* 50zł niebieski - jaśniejszy granatowy */
      text-shadow:0 0 6px rgba(0,30,90,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-100 .money-cell-text{
      color:#1a8a3a;          /* 100zł zielony - intensywna zieleń */
      text-shadow:0 0 6px rgba(0,40,15,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-200 .money-cell-text{
      color:#a87010;          /* 200zł złoty - jasny złoty/oker */
      text-shadow:0 0 6px rgba(60,30,0,.55), 0 1px 1px rgba(255,255,255,.3);
    }
    .money-cell.note-500 .money-cell-text{
      color:#7a3aaa;          /* 500zł fiolet - jasny fioletowy */
      text-shadow:0 0 6px rgba(40,0,60,.6), 0 1px 1px rgba(255,255,255,.3);
    }
    /* Per-banknot offsety (gdyby okienko obrazka nie było centralnie - korekta) */
    .money-cell.note-50  { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-100 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-200 { --note-tx:0%; --note-ty:0%; }
    .money-cell.note-500 { --note-tx:0%; --note-ty:0%; }
    /* Punkt 2: górny banknot kwota w lewo o 20% szerokości komórki */
    #moneyTop .money-cell-text { --row-shift:-20%; }
    #moneyBot .money-cell-text { --row-shift:0%; }

    /* moneta (przycisk dolny prawy) */
    .coin-btn{
      background:#000;
      padding:0;
      overflow:hidden;
      border-radius:0;
    }
    .coin-cell{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background-color:#000;
      background-size:contain;
      background-position:center;
      background-repeat:no-repeat;
      z-index:2;
    }
    .coin-cell.empty{ background-image:none !important; }
    .coin-cell-text{
      font-size:clamp(34px, 9.5vw, 54px);
      font-weight:900;
      text-align:center;
      line-height:1;
      font-variant-numeric:tabular-nums;
      white-space:nowrap;
    }
    .coin-cell.coin-1 .coin-cell-text{
      color:#3a3a3a;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-2 .coin-cell-text{
      color:#5e3f08;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }
    .coin-cell.coin-5 .coin-cell-text{
      color:#3a2a06;
      text-shadow:0 0 3px rgba(255,255,255,.85);
    }

    /* === v1.12: garnek "spał" po wykorzystaniu === */
    .pot-btn.dimmed{
      opacity:.45;
    }

    /* === v1.12: Animacja END - czerwona fala zalewająca tarczę + napis + odliczanie === */
    .end-confirm-overlay{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      z-index:50;
      pointer-events:auto;
      /* ograniczenie do okręgu tarczy zegara - środek (50%,50%), promień ~50% */
      clip-path:circle(50% at 50% 50%);
      -webkit-clip-path:circle(50% at 50% 50%);
      overflow:hidden;
      border-radius:50%;
    }
    .end-confirm-overlay.hidden{ display:none; }
    .end-wave{
      position:absolute;
      left:50%; top:50%;
      width:0; height:0;
      background:radial-gradient(circle,#ff2828 0%,#a80000 70%,#5e0000 100%);
      border-radius:50%;
      transform:translate(-50%,-50%);
      animation:endWaveExpand .55s ease-out forwards;
    }
    /* Wariant żółty dla resetu */
    .end-confirm-overlay.yellow .end-wave{
      background:radial-gradient(circle,#ffe040 0%,#d6a90a 70%,#7a5e00 100%);
    }
    .end-confirm-overlay.yellow .end-confirm-counter,
    .end-confirm-overlay.yellow .end-confirm-title,
    .end-confirm-overlay.yellow .end-confirm-hint{
      color:#1c1400;
      text-shadow:0 1px 3px rgba(255,255,255,.5);
    }
    @keyframes endWaveExpand{
      0%   { width:0; height:0; opacity:.6; }
      100% { width:200%; height:200%; opacity:1; }
    }
    /* Punkt 5: zwijanie wstecz gdy minie czas bez kliknięcia */
    @keyframes endWaveCollapse{
      0%   { width:200%; height:200%; opacity:1; }
      100% { width:0; height:0; opacity:.4; }
    }
    .end-confirm-overlay.collapsing .end-wave{
      animation:endWaveCollapse .5s ease-in forwards !important;
    }
    .end-confirm-overlay.collapsing .end-confirm-content{
      animation:endTextFadeOut .25s ease-out forwards !important;
    }
    @keyframes endTextFadeOut{
      0% { opacity:1; }
      100% { opacity:0; }
    }
    .end-confirm-content{
      position:relative;
      z-index:51;
      text-align:center;
      color:#fff;
      opacity:0;
      animation:endTextFade .35s .35s forwards;
      padding:0 16px;
    }
    @keyframes endTextFade{ to{ opacity:1; } }
    .end-confirm-title{
      font-size:clamp(18px, 4.6vw, 26px);
      font-weight:900;
      letter-spacing:.5px;
      line-height:1.1;
      text-shadow:0 2px 6px rgba(0,0,0,.6);
      margin-bottom:8px;
    }
    .end-confirm-counter{
      font-size:clamp(60px, 18vw, 110px);
      font-weight:900;
      line-height:1;
      text-shadow:0 4px 14px rgba(0,0,0,.7);
    }
    .end-confirm-hint{
      font-size:clamp(12px, 3vw, 15px);
      font-weight:700;
      color:rgba(255,230,230,.92);
      margin-top:6px;
    }

    .work-btn{ background:linear-gradient(180deg,var(--btn-work-off-1),var(--btn-work-off-2)); }
    .work-btn.on{
      background:linear-gradient(180deg,var(--btn-work-on-1),var(--btn-work-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.14),
                  inset 0 -12px 16px rgba(0,0,0,.24),
                  0 0 20px rgba(56,200,102,.38),
                  0 0 0 1px rgba(56,200,102,.45);
    }
    .work-btn.overtime{
      background:linear-gradient(180deg,var(--btn-work-over-1),var(--btn-work-over-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.15),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 22px rgba(255,154,31,.55),
                  0 0 0 1px rgba(255,154,31,.55);
    }

    .exercise-btn{ background:linear-gradient(180deg,var(--btn-ex-off-1),var(--btn-ex-off-2)); }
    .exercise-btn.flash{
      background:linear-gradient(180deg,var(--btn-ex-on-1),var(--btn-ex-on-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16),
                  inset 0 -12px 16px rgba(0,0,0,.2),
                  0 0 22px rgba(255,170,63,.45),
                  0 0 0 1px rgba(255,170,63,.45);
    }
    .exercise-btn.alert{
      background:linear-gradient(180deg,var(--btn-ex-alert-1),var(--btn-ex-alert-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10),
                  inset 0 -12px 16px rgba(0,0,0,.22),
                  0 0 18px rgba(209,39,39,.34),
                  0 0 0 1px rgba(209,39,39,.42);
    }
    .exercise-btn.blink{
      background:linear-gradient(180deg,var(--btn-ex-blink-1),var(--btn-ex-blink-2));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.18),
                  inset 0 -12px 16px rgba(0,0,0,.18),
                  0 0 24px rgba(255,90,71,.52),
                  0 0 0 1px rgba(255,90,71,.52);
    }

    .break-btn{ background:linear-gradient(180deg,var(--btn-break-off-1),var(--btn-break-off-2)); }
    .break-btn.on{
      background:linear-gradient(180deg,var(--btn-break-on-1),var(--btn-break-on-2));
      color:#272100;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22),
                  inset 0 -12px 16px rgba(0,0,0,.1),
                  0 0 24px rgba(255,232,77,.55),
                  0 0 0 1px rgba(255,232,77,.55);
    }

    .pot-btn{ background:linear-gradient(180deg,var(--btn-pot-off-1),var(--btn-pot-off-2)); }
    .pot-btn.done-alarm{ background:linear-gradient(180deg,#ff5050,#ff3030); box-shadow:inset 0 0 0 1px rgba(255,200,200,.4), 0 0 30px rgba(255,48,48,.7); }
    .pot-btn.done-alarm-off{ background:linear-gradient(180deg,#3a0000,#1a0000); }
    /* pasek ognia rosnący od dołu podczas grzania */
    .pot-fire-bar{
      position:absolute; bottom:0; left:0; right:0;
      background:linear-gradient(0deg,#7a0000,#d42020);
      border-radius:0 0 14px 14px;
      z-index:1;
      transition:height 0.8s linear;
      pointer-events:none;
    }

    .money-btn{ background:linear-gradient(180deg,var(--btn-money-1),var(--btn-money-2)); }

    .btn-inner{
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      pointer-events:none;
      z-index:2;
    }
    .btn-inner.money-stack{ flex-direction:column; gap:2px; padding:4px; }

<body>
  <div class="app">

  <div class="version">v:1.16</div>

  <script>
    const LS_KEY = 'tarcza_state_v1';
    const LS_PERSIST = 'tarcza_persist_v1';
    const LS_APPSCRIPT = 'tarcza_appscript_url';

    const PROVIDERS = [
      { key:'uber',    label:'UBER',    bg:'#000000', fg:'#ffffff' },
      { key:'bolt',    label:'BOLT',    bg:'#34d186', fg:'#ffffff' },
      { key:'taxi',    label:'TAXI',    bg:'#f4d500', fg:'#000000' },
      { key:'priv',    label:'PRIV',    bg:'#13204a', fg:'#ffffff' },
      { key:'freenow', label:'FREENOW', bg:'#000000', fg:'#ff3838' },
      { key:'agap',    label:'AGAP',    bg:'#ff8a0a', fg:'#000000' },
      { key:'tip',     label:'NAPIWEK', bg:'#9adf9a', fg:'#0d3b0d' },
      { key:'other',   label:'INNE',    bg:'#555555', fg:'#ffffff' }
    ];

    let startWorkMinutes = null;
    let endWorkMinutes = null;
    let lastExerciseMinutes = null;
    let breakActive = false;
    let currentBreakStart = null;
    let breakSegments = [];
    let exerciseMarkers = [];
    let breakAdjustMinutes = 0;
    let workDate = null;

    let potDurationMin = 20;
    let potStartedAt = null;
    let potAckedDone = false;
    let potUsedToday = false;

    let revenues = {};
    PROVIDERS.forEach(p => revenues[p.key] = 0);

    let counterStart = null;
    let counterEnd = null;
    let privKmTotal = 0;

    let lastCounterEnd = null;
    let notes = [];

    let editMode = "start";
    let editHour = 0, editMinute = 0;
    let editSignedMinutes = 0;
    let editPotMinutes = 20;

    let keypadMode = null;
    let keypadContext = null;
    let keypadRaw = '';
    let keypadCounterDigits = [];
    let keypadCursorFromRight = 0;

    const cx=200, cy=200, radius=180;
    let blinkState = false;

    // ===== localStorage =====
    function saveState(){
      try{
        const state = {
          startWorkMinutes, endWorkMinutes, lastExerciseMinutes,
          breakActive, currentBreakStart, breakSegments,
          exerciseMarkers, breakAdjustMinutes, workDate,
          potDurationMin, potStartedAt, potAckedDone, potUsedToday,
          revenues, counterStart, counterEnd, privKmTotal
        };
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        const persist = { lastCounterEnd, notes };
        localStorage.setItem(LS_PERSIST, JSON.stringify(persist));
      }catch(e){}
    }
    function loadState(){
      try{
        const raw = localStorage.getItem(LS_KEY);
        if(raw){
          const s = JSON.parse(raw);
          startWorkMinutes = s.startWorkMinutes ?? null;
          endWorkMinutes = s.endWorkMinutes ?? null;
          lastExerciseMinutes = s.lastExerciseMinutes ?? null;
          breakActive = !!s.breakActive;
          currentBreakStart = s.currentBreakStart ?? null;
          breakSegments = Array.isArray(s.breakSegments) ? s.breakSegments : [];
          exerciseMarkers = Array.isArray(s.exerciseMarkers) ? s.exerciseMarkers : [];
          breakAdjustMinutes = s.breakAdjustMinutes || 0;
          workDate = s.workDate || null;
          potDurationMin = s.potDurationMin ?? 20;
          potStartedAt = s.potStartedAt ?? null;
          potAckedDone = !!s.potAckedDone;
          potUsedToday = !!s.potUsedToday;
          if(s.revenues){
            PROVIDERS.forEach(p => revenues[p.key] = s.revenues[p.key] || 0);
          }
          counterStart = s.counterStart ?? null;
          counterEnd = s.counterEnd ?? null;
          privKmTotal = s.privKmTotal || 0;
        }
        const rawP = localStorage.getItem(LS_PERSIST);
        if(rawP){
          const p = JSON.parse(rawP);
          lastCounterEnd = p.lastCounterEnd ?? null;
          notes = Array.isArray(p.notes) ? p.notes : [];
        }
      }catch(e){}
    }

    // ===== pomocnicze =====
    function pad(n){ return String(n).padStart(2,'0'); }
    function nowMinutes(){ const d=new Date(); return d.getHours()*60 + d.getMinutes(); }
    function effectiveNow(){ return endWorkMinutes!==null ? endWorkMinutes : nowMinutes(); }
    function todayISO(){ const d=new Date(); return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
    function formatHHMM(m){ m=((m%1440)+1440)%1440; return `${pad(Math.floor(m/60))}:${pad(m%60)}`; }
    function formatCompact(m){ m=Math.max(0,m); const h=Math.floor(m/60), mm=m%60; return h<=0?String(mm):`${h}:${pad(mm)}`; }
    function formatCompactSigned(m){ const s=m<0?'-':''; const a=Math.abs(m); const h=Math.floor(a/60), mm=a%60; return h<=0?s+String(mm):`${s}${h}:${pad(mm)}`; }
    function minutesToHHMM(m){ m=Math.max(0,m); return pad(Math.floor(m/60))+':'+pad(m%60); }
    function diffMinutes(f,t){ let d=t-f; if(d<0) d+=1440; return d; }
    function clock720(m){ return m%720; }
    function angleFromMinutes(m){ return (clock720(m)/720)*360 - 90; }
    function polarToCartesian(cX,cY,r,a){ const rad=a*Math.PI/180; return {x:cX+Math.cos(rad)*r, y:cY+Math.sin(rad)*r}; }
    function clearChildren(n){ while(n.firstChild) n.removeChild(n.firstChild); }
    function createSectorPath(sM,eM,r){
      let diff=clock720(eM)-clock720(sM);
      if(diff<0) diff+=720;
      if(diff===0) return '';
      const p1=polarToCartesian(cx,cy,r,angleFromMinutes(sM));
      const p2=polarToCartesian(cx,cy,r,angleFromMinutes(eM));
      const large=diff>360?1:0;
      return `M ${cx} ${cy} L ${p1.x} ${p1.y} A ${r} ${r} 0 ${large} 1 ${p2.x} ${p2.y} Z`;
    }
    function svgFilledPath(d,c,o=1,extra={}){
      const p=document.createElementNS('http://www.w3.org/2000/svg','path');
      p.setAttribute('d',d); p.setAttribute('fill',c); p.setAttribute('opacity',o);
      Object.keys(extra).forEach(k=>p.setAttribute(k,extra[k]));
      return p;
    }
    function svgLine(x1,y1,x2,y2,c,w,dash=''){
      const l=document.createElementNS('http://www.w3.org/2000/svg','line');
      l.setAttribute('x1',x1); l.setAttribute('y1',y1); l.setAttribute('x2',x2); l.setAttribute('y2',y2);
      l.setAttribute('stroke',c); l.setAttribute('stroke-width',w);
      l.setAttribute('stroke-linecap','round'); l.setAttribute('opacity','0.96');
      if(dash) l.setAttribute('stroke-dasharray',dash);
      return l;
    }

    function buildDots(){
      const g=document.getElementById('dots');
      clearChildren(g);
      for(let i=0;i<60;i++){
        const ang=(i*6-90)*Math.PI/180;
        const x=cx+Math.cos(ang)*radius, y=cy+Math.sin(ang)*radius;
        const isH=i%5===0;
        const dot=document.createElementNS('http://www.w3.org/2000/svg','circle');
        dot.setAttribute('cx',x.toFixed(2)); dot.setAttribute('cy',y.toFixed(2));
        dot.setAttribute('r', isH?'3.8':'2.1');
        dot.setAttribute('fill', isH?'var(--dot-big)':'var(--dot)');
        dot.setAttribute('opacity', isH?'0.92':'0.72');
        g.appendChild(dot);
      }
    }

    // ===== wskazówki (trójkąty, obwódka, minutowa na wierzchu) =====
    function renderHands(){
      const g=document.getElementById('hands');
      clearChildren(g);
      const now=new Date();
      const h=now.getHours()%12, m=now.getMinutes(), s=now.getSeconds();
      const hourDeg=h*30 + m*0.5;
      const minDeg=m*6 + s*0.1;

      function tri(len, halfW, angDeg, fill){
        const rad=(angDeg-90)*Math.PI/180;
        const dX=Math.cos(rad), dY=Math.sin(rad);
        const pX=-dY, pY=dX;
        const tipX=cx+dX*len, tipY=cy+dY*len;
        const bX=cx-dX*6, bY=cy-dY*6;
        const blX=bX+pX*halfW, blY=bY+pY*halfW;
        const brX=bX-pX*halfW, brY=bY-pY*halfW;
        const p=document.createElementNS('http://www.w3.org/2000/svg','polygon');
        p.setAttribute('points',`${tipX},${tipY} ${blX},${blY} ${brX},${brY}`);
        p.setAttribute('fill',fill);
        p.setAttribute('stroke','var(--hand-outline)');
        p.setAttribute('stroke-width','1.6');
        p.setAttribute('stroke-linejoin','round');
        return p;
      }
      // godzinowa (pod spodem), skrócona o 1/3
      g.appendChild(tri(100, 12, hourDeg, 'var(--hand-hour)'));
      // minutowa na wierzchu
      g.appendChild(tri(150, 7, minDeg, 'var(--hand-minute)'));

      // === Podświetlenie aktualnej godziny (zmiana 14) ===
      // Reguła: 0..30 min świeci tylko aktualna godzina, 30..55 świecą obie (akt + następna),
      // 55..60 świeci tylko następna.
      let activeHours = [];
      const hh12 = h === 0 ? 12 : h;
      const nextHh = hh12 === 12 ? 1 : hh12 + 1;
      if(m < 30){
        activeHours = [hh12];
      } else if(m < 55){
        activeHours = [hh12, nextHh];
      } else {
        activeHours = [nextHh];
      }
      document.querySelectorAll('.number').forEach(el => {
        const hourVal = parseInt(el.dataset.hour, 10);
        el.classList.toggle('active', activeHours.includes(hourVal));
      });
    }

    // ===== czas / praca =====
    function getClosedBreakMinutes(){ let s=0; for(const seg of breakSegments) s+=diffMinutes(seg.start,seg.end); return s; }
    function getActiveBreakMinutes(){ return (breakActive&&currentBreakStart!==null)?diffMinutes(currentBreakStart,effectiveNow()):0; }
    function getTotalBreakMinutes(a=true){ let s=getClosedBreakMinutes()+breakAdjustMinutes; if(a) s+=getActiveBreakMinutes(); return s; }
    function getNetWorkMinutes(){ if(startWorkMinutes===null) return 0; return diffMinutes(startWorkMinutes,effectiveNow()) - getTotalBreakMinutes(true); }
    function getForecastEndMinutes(){ if(startWorkMinutes===null) return null; return startWorkMinutes + 480 + getTotalBreakMinutes(true); }
    function getBreakOverlapSince(anchor){
      const total=diffMinutes(anchor,effectiveNow()); let o=0;
      for(const seg of breakSegments){
        let s=diffMinutes(anchor,seg.start), e=diffMinutes(anchor,seg.end);
        if(e<s) e+=1440;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      if(breakActive&&currentBreakStart!==null){
        let s=diffMinutes(anchor,currentBreakStart), e=total;
        const f=Math.max(0,s), t=Math.min(total,e);
        if(t>f) o+=t-f;
      }
      return o;
    }
    function getEffectiveExerciseElapsed(){
      if(startWorkMinutes===null||lastExerciseMinutes===null) return 0;
      return Math.max(0, diffMinutes(lastExerciseMinutes,effectiveNow()) - getBreakOverlapSince(lastExerciseMinutes));
    }

    // === Bug 15: efektywny początek czerwonego sektora ===
    // Jeśli po lastExerciseMinutes była przerwa, "wizualny" start brakuczu ćwiczeń
    // to koniec OSTATNIEJ takiej przerwy. W przeciwnym razie - lastExerciseMinutes.
    // Dotyczy zarówno czerwonego pola na tarczy jak i radaru.
    function getRedSectorStart(){
      if(lastExerciseMinutes===null) return null;
      const now = effectiveNow();
      let latestBreakEnd = null;
      // Iteruj zamknięte przerwy
      for(const seg of breakSegments){
        // Czy ta przerwa jest między lastExerciseMinutes a now?
        const segEndAfter = diffMinutes(lastExerciseMinutes, seg.end);
        const segEndBeforeNow = diffMinutes(seg.end, now);
        // segment jest "po lastExercise" gdy segEndAfter < diffMinutes(lastExerciseMinutes, now)
        // i jednocześnie seg.end <= now (czyli zamknięta przerwa skończyła się przed now)
        if(segEndAfter > 0 && segEndAfter <= diffMinutes(lastExerciseMinutes, now)){
          // wybierz najpóźniejszą z takich przerw
          if(latestBreakEnd === null || segEndAfter > diffMinutes(lastExerciseMinutes, latestBreakEnd)){
            latestBreakEnd = seg.end;
          }
        }
      }
      // Jeśli aktualnie trwa przerwa - radar nie powinien latać dalej, ale getEffectiveExerciseElapsed
      // już pauzuje liczenie. Tu zwracamy najlepszy znany punkt:
      return latestBreakEnd !== null ? latestBreakEnd : lastExerciseMinutes;
    }

    function renderRadarSweep(){
      const sw=document.getElementById('radarSweep');
      clearChildren(sw);
      if(startWorkMinutes===null||lastExerciseMinutes===null) return;
      if(getEffectiveExerciseElapsed()<=60) return;

      const sM=getRedSectorStart();
      const eM=effectiveNow();
      const spanM=diffMinutes(sM,eM);
      if(spanM<=0) return;

      const cycle=4000;
      const t=(Date.now()%cycle)/cycle;
      const progress = t<0.5 ? t*2 : 1-(t-0.5)*2;
      const posM=sM + progress*spanM;
      const widthM=Math.max(1.5, spanM*0.06);

      const tip=createSectorPath(posM-widthM/2, posM+widthM/2, radius);
      if(tip) sw.appendChild(svgFilledPath(tip,'#ffcccc',0.85));

      for(let i=1;i<=3;i++){
        const off=widthM*1.8*i;
        const dir=(t<0.5)?-1:1;
        const tailC=posM+dir*off;
        if(tailC<sM||tailC>eM) continue;
        const tail=createSectorPath(tailC-widthM/2, tailC+widthM/2, radius);
        if(tail) sw.appendChild(svgFilledPath(tail,'#ff8888', 0.5/i));
      }
    }

    // === Rolka cyfr godzin pracy ===
    // Strategia: wysokość okna rolki = clientHeight w px. Każda cyfra ma tę samą
    // wysokość. translateY = -(intH+frac) * h. Cyfry 10..20 mają mniejszy font,
    // żeby zmieściły się dwucyfrowe.
    function renderWorkRoller(workMinutes){
      const roller = document.querySelector('#workBtn .work-roller');
      const inner = document.getElementById('workRollerInner');
      if(!roller || !inner) return;

      // Lazy build: cyfry 0..20 + znaczniki ◀ ▶ na rolce
      if(inner.dataset.built !== '1'){
        inner.innerHTML='';
        for(let i=0; i<=20; i++){
          const d = document.createElement('div');
          d.className = 'work-roller-digit' + (i>=10 ? ' two-digit' : '');
          d.textContent = i;
          inner.appendChild(d);
        }
        if(!roller.querySelector('.work-roller-mark-left')){
          const ml = document.createElement('div');
          ml.className = 'work-roller-mark-left';
          roller.appendChild(ml);
          const mr = document.createElement('div');
          mr.className = 'work-roller-mark-right';
          roller.appendChild(mr);
        }
        inner.dataset.built='1';
      }

      const h = roller.clientHeight;
      if(!h) return;  // jeszcze nie zrenderowane

      // Każda cyfra ma height = 55% wysokości okna - dzięki temu sąsiadująca cyfra
      // jest widoczna częściowo (efekt "rolki", gdzie cyfra wypiera następną).
      const digitH = Math.round(h * 0.55);

      // Ustaw wysokość każdej cyfry i font proporcjonalnie do digitH
      if(inner.dataset.lastH !== String(h)){
        inner.querySelectorAll('.work-roller-digit').forEach(d => {
          d.style.height = digitH + 'px';
          if(d.classList.contains('two-digit')){
            d.style.fontSize = Math.floor(digitH * 0.78) + 'px';
          } else {
            d.style.fontSize = Math.floor(digitH * 0.92) + 'px';
          }
        });
        inner.dataset.lastH = String(h);
      }

      // Wycentruj tak, by aktualna cyfra była na środku okna.
      // top inner = (h/2 - digitH/2) - (intH+frac)*digitH
      const totalH = workMinutes / 60;
      const intH = Math.min(20, Math.floor(totalH));
      const frac = totalH - Math.floor(totalH);
      const baseOffset = (h / 2) - (digitH / 2);
      const offset = baseOffset - (intH + frac) * digitH;
      inner.style.transform = `translateY(${offset}px)`;
    }

    // Czy notatka ma w tej chwili aktywny alarm (czas przekroczony i nie potwierdzony)?
    function isNoteAlarmActive(n, nowMs){
      if(!n.alarmTime || !Array.isArray(n.alerts) || n.alerts.length === 0) return false;
      const triggerTimes = computeNoteAlertTimes(n);
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked) return true;
      }
      return false;
    }
    // Oblicz czasy ms dla każdego alertu (w kontekście dzisiejszego dnia)
    function computeNoteAlertTimes(n){
      if(!n.alarmTime) return [];
      const [hh,mm] = n.alarmTime.split(':').map(x=>parseInt(x,10));
      const target = new Date();
      target.setHours(hh, mm, 0, 0);
      const targetMs = target.getTime();
      const acked = n.ackedAlerts || {};
      return (n.alerts||[]).map(min => ({
        offset: min,
        ms: targetMs - min*60*1000,
        acked: !!acked[min]
      }));
    }
    function ackNoteAlarm(n){
      const triggerTimes = computeNoteAlertTimes(n);
      const nowMs = Date.now();
      // Potwierdź najbliższy nadal aktywny
      for(const t of triggerTimes){
        if(nowMs >= t.ms && !t.acked){
          if(!n.ackedAlerts) n.ackedAlerts = {};
          n.ackedAlerts[t.offset] = true;
          break;
        }
      }
    }

        hT=pad(editHour); mT=pad(editMinute); lab='Godzina rozpoczęcia pracy';
      } else if(editMode==='breakAdjust'){
        const s=editSignedMinutes<0?'-':''; const a=Math.abs(editSignedMinutes);
        hT=`${s}${pad(Math.floor(a/60))}`; mT=pad(a%60); lab='Korekta sumy przerw (+/-)';
      } else if(editMode==='pot'){
        hT=pad(Math.floor(editPotMinutes/60)); mT=pad(editPotMinutes%60); lab='Czas grzania obiadu';
      }
      showOverlay(`

    function timeEditorAction(a){
      if(a==='cancel'){ hideOverlay(); return; }
      if(a==='ok'){
        if(editMode==='start'){
          setWorkStart(editHour*60+editMinute, true);
        } else if(editMode==='breakAdjust'){
          breakAdjustMinutes += editSignedMinutes;
          saveState(); renderAll();
        } else if(editMode==='pot'){
          potDurationMin = Math.max(1, editPotMinutes);
          saveState(); renderAll();
        }
        hideOverlay(); return;
      }
      if(editMode==='start'){
        if(a==='hUp') editHour=(editHour+1)%24;
        if(a==='hDn') editHour=(editHour+23)%24;
        if(a==='mUp') editMinute=(editMinute+1)%60;
        if(a==='mDn') editMinute=(editMinute+59)%60;
      } else if(editMode==='breakAdjust'){
        if(a==='hUp') editSignedMinutes+=60;
        if(a==='hDn') editSignedMinutes-=60;
        if(a==='mUp') editSignedMinutes+=1;
        if(a==='mDn') editSignedMinutes-=1;
      } else if(editMode==='pot'){
        if(a==='hUp') editPotMinutes=Math.min(999,editPotMinutes+60);
        if(a==='hDn') editPotMinutes=Math.max(1,editPotMinutes-60);
        if(a==='mUp') editPotMinutes=Math.min(999,editPotMinutes+1);
        if(a==='mDn') editPotMinutes=Math.max(1,editPotMinutes-1);
      }
      renderTimeEditor();
    }

    // ===== keypad =====
    function openKeypad(mode,ctx){
      keypadMode=mode;
      keypadContext=ctx;
      keypadRaw='';
      if(mode==='counter'){
        let hint=ctx.hint;
        if(hint===null||hint===undefined) hint=0;
        // Trzymam oryginalny hint (do liveKm i do backspace)
        keypadContext.hintDigits = String(hint).padStart(6,'0').split('').map(d=>parseInt(d));
        keypadCounterDigits = keypadContext.hintDigits.slice();
        keypadContext.entered = [];   // historia wpisanych cyfr (od pierwszej do ostatniej)
        keypadCursorFromRight = 0;    // zawsze na ostatniej pozycji
      }
      renderKeypad();
    }
    function liveKmPreview(){
      // oblicza przebieg na podstawie aktualnie wpisywanych cyfr licznika końcowego
      const curEnd=parseInt(keypadCounterDigits.join(''),10);
      if(counterStart===null) return '';
      const km=curEnd - counterStart - privKmTotal;
      return `przebieg: ${km} km`;
    }

    function renderKeypad(){
      let disp='', lab='';
      if(keypadMode==='amount'){
        const p=PROVIDERS.find(x=>x.key===keypadContext.provider);
        lab=`Kwota: ${p.label}${keypadContext.addMode?' (dodaj)':''}`;
        disp=formatAmountDisplay(parseInt(keypadRaw||'0',10));
      } else if(keypadMode==='counter'){
        lab=keypadContext.label||'Licznik';
        // Kursor zawsze na ostatniej pozycji (idx=5)
        disp=keypadCounterDigits.map((d,i)=> i===5?`<span class="underline">${d}</span>`:String(d)).join('');
      }
      showOverlay(`
        <div class="big-panel" style="max-width:420px;">
          <div class="keypad-label">${lab}</div>
          <div class="keypad-display">${disp}</div>
          ${keypadMode==='counter' && keypadContext.field==='end'
            ? `<div style="text-align:center;font-size:17px;font-weight:700;color:#aaa;padding:2px 0 4px;">${liveKmPreview()}</div>`
            : ''}
          <div class="keypad" style="flex:1;">
            <button data-k="1">1</button><button data-k="2">2</button><button data-k="3">3</button>
            <button data-k="4">4</button><button data-k="5">5</button><button data-k="6">6</button>
            <button data-k="7">7</button><button data-k="8">8</button><button data-k="9">9</button>
            <button class="key-cancel" data-k="cancel">✕</button>
            <button data-k="0">0</button>
            <button class="key-ok" data-k="ok">✓</button>
            <button class="key-back" data-k="back" style="grid-column:span 3;">← Cofnij</button>
          </div>
        </div>
      `);
      overlay.querySelectorAll('[data-k]').forEach(b=>{
        b.addEventListener('click',(e)=>{ e.stopPropagation(); keypadPress(b.dataset.k); });
      });
    }
    function keypadPress(k){
      if(k==='cancel'){
        if(keypadMode==='amount') openMoneyPanel();
        else if(keypadMode==='counter') openCounterPanel();
        return;
      }
      if(k==='ok'){ commitKeypad(); return; }
      if(k==='back'){
        if(keypadMode==='amount'){
          keypadRaw=keypadRaw.slice(0,-1);
        } else if(keypadMode==='counter'){
          // cofnij ostatnio wpisaną cyfrę: usuń z entered, odbuduj displej z hint + entered
          if(keypadContext.entered.length > 0){
            keypadContext.entered.pop();
            rebuildCounterDisplay();
          }
        }
        renderKeypad(); return;
      }
      if(/^[0-9]$/.test(k)){
        if(keypadMode==='amount'){
          if(keypadRaw.length<10) keypadRaw+=k;
        } else if(keypadMode==='counter'){
          // shift left + push: nowa cyfra na końcu, najstarsza wypada z lewej
          keypadContext.entered.push(parseInt(k));
          if(keypadContext.entered.length > 6) keypadContext.entered.shift();
          rebuildCounterDisplay();
          // auto-akceptacja po wpisaniu 6 cyfr (cały licznik nadpisany)
          if(keypadContext.entered.length >= 6){
            commitKeypad();
            return;
          }
        }
        renderKeypad();
      }
    }
    // Buduje keypadCounterDigits jako: hint z lewej (na pozycjach niezastąpionych) + entered z prawej
    function rebuildCounterDisplay(){
      const hint = keypadContext.hintDigits;
      const ent = keypadContext.entered;
      const n = ent.length;
      // n=0: tylko hint; n=k: ostatnich k pozycji to entered, reszta z hint (przesunięta? NIE - hint zostaje na lewych pozycjach)
      // Przykład: hint=284756, wpisuję 3 -> 284753 (zastąpiona ostatnia)
      // Wpisuję jeszcze 9 -> 284739 (ostatnie 2)
      const result = hint.slice();
      for(let i=0; i<n; i++){
        result[6 - n + i] = ent[i];
      }
      keypadCounterDigits = result;
    }
    function commitKeypad(){
      if(keypadMode==='amount'){
        const g=parseInt(keypadRaw||'0',10);
        if(g>0){
          const k=keypadContext.provider;
          if(keypadContext.addMode) revenues[k]=(revenues[k]||0)+g;
          else revenues[k]=g;
        }
        saveState();
        openMoneyPanel();
      } else if(keypadMode==='counter'){
        const val=parseInt(keypadCounterDigits.join(''),10);
        if(keypadContext.field==='start') counterStart=val;
        else if(keypadContext.field==='end') counterEnd=val;
        else if(keypadContext.field==='priv') privKmTotal+=val;
        saveState();
        openCounterPanel();
      }
    }

    function openCounterPanel(){
      // Licznik początkowy: jeśli pusty to pokaż lastCounterEnd (z wczoraj) jako podpowiedź
      const sDisplay = counterStart!==null ? counterStart : (lastCounterEnd!==null ? lastCounterEnd : null);

      const eT=counterEnd!==null?counterEnd:'—';
      const pT=privKmTotal>0?privKmTotal:'—';
      // Punkt 9: przebieg służbowy = końcowy - początkowy - prywatne
      let kmZaw = null;
      if(counterEnd !== null && sDisplay !== null){
        kmZaw = counterEnd - sDisplay - privKmTotal;
      }
      const kmZawT = kmZaw !== null ? kmZaw : '—';
      // Końcowy nie jest disabled jeśli mamy podpowiedź sDisplay (czyli też z lastCounterEnd)
      const endDis=sDisplay===null?' disabled':'';
      showOverlay(`
        <div class="big-panel">

          <div class="counter-fields">

              <button class="counter-edit" data-cnt="end">✎</button>
            </div>
            <div class="counter-row">
              <div class="counter-label">km PRIV (dodaj)</div>
              <div class="counter-value ${privKmTotal>0?'':'empty'}">${pT}</div>
              <button class="counter-edit" data-cnt="priv">＋</button>
            </div>
            <div class="counter-row" style="background:#0a1f0d;">
              <div class="counter-label" style="color:#7adf8a;">Przebieg służbowy</div>
              <div class="counter-value ${kmZaw!==null?'':'empty'}" style="${kmZaw!==null?'color:#7adf8a;':''}">${kmZawT}</div>
              <span style="width:36px;"></span>
            </div>
          </div>
          <div style="flex:1;"></div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="back">←</button>
            <button class="ok-btn" data-act="ok">✓</button>
          </div>
        </div>
      `);
      overlay.querySelector('[data-act="back"]').addEventListener('click',(e)=>{ e.stopPropagation(); openMoneyPanel(); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click',(e)=>{
        e.stopPropagation();
        // Jeśli counterStart jeszcze pusty ale mamy lastCounterEnd - akceptuj jako start (potwierdzenie)
        if(counterStart===null && lastCounterEnd!==null){
          counterStart = lastCounterEnd;
        }
        saveState(); hideOverlay(); renderAll();
      });
      overlay.querySelectorAll('[data-cnt]').forEach(b=>{
        b.addEventListener('click',(e)=>{
          e.stopPropagation();
          const f=b.dataset.cnt;
          let hint=0, label='Licznik';
          if(f==='start'){
            hint=counterStart!==null?counterStart:(lastCounterEnd!==null?lastCounterEnd:0);
            label='Stan licznika początkowy';
          } else if(f==='end'){
            hint=counterEnd!==null?counterEnd:(counterStart!==null?counterStart:(lastCounterEnd!==null?lastCounterEnd:0));
            label='Stan licznika końcowy';
          } else if(f==='priv'){
            hint=0; label='Dodaj km prywatne';
          }
          openKeypad('counter',{ field:f, hint, label });
        });
      });
    }

    // ===== notatki =====
    function openNoteEditor(noteId){
      const ex = noteId!==null?notes.find(n=>n.id===noteId):null;
      const text=ex?ex.text:'';
      const icon=ex?ex.icon:'';
      const alarmTime = ex && ex.alarmTime ? ex.alarmTime : '';
      const alerts = (ex && Array.isArray(ex.alerts)) ? ex.alerts.slice() : [];
      // Domyślne wyprzedzenia
      const defaultOffsets = [15, 30, 60, 120];
      // Pamiętamy własne wyprzedzenia (jeśli ktoś zedytował przez long-press)
      const customOffsets = (ex && Array.isArray(ex.customOffsets)) ? ex.customOffsets.slice() : defaultOffsets.slice();

      function offsetLabel(min){
        if(min < 60) return min + 'm';
        if(min % 60 === 0) return (min/60) + 'H';
        return Math.floor(min/60) + 'H' + (min%60) + 'm';
      }

      showOverlay(`
        <div class="big-panel">
          <h3>${ex?'Edytuj notatkę':'Nowa notatka'}</h3>
          <div class="note-fields">
            <label>Treść</label>
            <textarea id="noteText" rows="4" placeholder="Np. kupić wodę...">${text.replace(/</g,'&lt;')}</textarea>
            <label>Symbol widoczny na karteczce (1–3 znaki)</label>
            <input id="noteIcon" class="icon-input" maxlength="3" value="${(icon||'').replace(/"/g,'&quot;')}" placeholder="💧" />
            <label>Godzina alarmu (opcjonalnie, HH:MM)</label>
            <input id="noteAlarm" class="icon-input" style="max-width:120px;" maxlength="5" value="${alarmTime}" placeholder="14:30" />
            <label>Wyprzedzenie alarmu</label>
            <div id="alertButtons" style="display:flex;gap:6px;flex-wrap:wrap;">
              ${customOffsets.map((off,idx)=>`
                <button type="button" class="alert-btn ${alerts.includes(off)?'on':''}" data-offset="${off}" data-idx="${idx}"
                        style="border:none;border-radius:8px;padding:8px 14px;font-size:16px;font-weight:800;cursor:pointer;
                               background:${alerts.includes(off)?'#5a4a18':'#2a2a2a'};
                               color:${alerts.includes(off)?'#ffd848':'#ccc'};">
                  ${offsetLabel(off)}
                </button>
              `).join('')}
            </div>
          </div>
          <div style="flex:1;"></div>
          <div class="panel-actions">
            <button class="cancel-btn" data-act="cancel">✕</button>
            <div style="display:flex;gap:8px;">
              ${ex?'<button class="delete-btn" data-act="delete">🗑</button>':''}
              <button class="ok-btn" data-act="ok">✓</button>
            </div>
          </div>
        </div>
      `);

      // Toggle alertów
      const currentAlerts = alerts.slice();
      const currentOffsets = customOffsets.slice();
      let alertEditTimer = null;

      overlay.querySelectorAll('.alert-btn').forEach(btn => {
        // krótki klik = toggle
        btn.addEventListener('click', (e)=>{
          e.stopPropagation();
          if(btn.dataset._longFired === '1'){ btn.dataset._longFired=''; return; }
          const off = parseInt(btn.dataset.offset, 10);
          const i = currentAlerts.indexOf(off);
          if(i >= 0) currentAlerts.splice(i,1);
          else currentAlerts.push(off);
          // odśwież wygląd
          if(currentAlerts.includes(off)){
            btn.classList.add('on');
            btn.style.background='#5a4a18';
            btn.style.color='#ffd848';
          } else {
            btn.classList.remove('on');
            btn.style.background='#2a2a2a';
            btn.style.color='#ccc';
          }
        });
        // long-press 2s = edycja wartości
        let lp=null;
        btn.addEventListener('pointerdown',(e)=>{
          lp = setTimeout(()=>{
            btn.dataset._longFired='1';
            const idx = parseInt(btn.dataset.idx, 10);
            const cur = currentOffsets[idx];
            const v = prompt('Wyprzedzenie w minutach:', String(cur));
            if(v !== null){
              const num = parseInt(v.trim(), 10);
              if(!isNaN(num) && num > 0){
                // jeśli stary off był aktywny, przepisz na nowy
                const oldOff = currentOffsets[idx];
                const wasOn = currentAlerts.indexOf(oldOff);
                if(wasOn>=0){ currentAlerts.splice(wasOn,1); currentAlerts.push(num); }
                currentOffsets[idx] = num;
                btn.dataset.offset = String(num);
                btn.textContent = offsetLabel(num);
              }
            }
          }, 2000);
        });
        btn.addEventListener('pointerup',()=>{ clearTimeout(lp); });
        btn.addEventListener('pointerleave',()=>{ clearTimeout(lp); });
        btn.addEventListener('pointercancel',()=>{ clearTimeout(lp); });
      });

      overlay.querySelector('[data-act="cancel"]').addEventListener('click',(e)=>{ e.stopPropagation(); hideOverlay(); });
      overlay.querySelector('[data-act="ok"]').addEventListener('click',(e)=>{
        e.stopPropagation();
        const t=document.getElementById('noteText').value.trim();
        const i=document.getElementById('noteIcon').value.trim()||'•';
        let aT=document.getElementById('noteAlarm').value.trim();
        // Walidacja czasu
        if(aT && !/^\d{1,2}:\d{2}$/.test(aT)) aT = '';
        const alertOffs = currentAlerts.slice().sort((a,b)=>a-b);
        if(ex){
          ex.text=t; ex.icon=i;
          ex.alarmTime = aT;
          ex.alerts = alertOffs;
          ex.customOffsets = currentOffsets;
          // Reset acked przy zmianie
          ex.ackedAlerts = {};
        } else {
          notes.push({
            id:Date.now(), text:t, icon:i,
            alarmTime: aT, alerts: alertOffs,
            customOffsets: currentOffsets,
            ackedAlerts: {}
          });
        }
        saveState(); hideOverlay(); renderAll();
      });
      const del=overlay.querySelector('[data-act="delete"]');
      if(del) del.addEventListener('click',(e)=>{
        e.stopPropagation();
        notes = notes.filter(n=>n.id!==noteId);
        saveState(); hideOverlay(); renderAll();
      });
    }

    // ===== start/stop =====
    function resetTimeline(){
      breakActive=false; currentBreakStart=null;
      breakSegments=[]; exerciseMarkers=[]; breakAdjustMinutes=0;
    }
    function setWorkStart(mins, fromEdit=false){
      // Jeśli poprzednia dniówka jest "zamknięta" (endWorkMinutes ustawiony) - to znaczy że
      // teraz startuję nową dniówkę. Czyścimy wszystkie dane poprzedniej dniówki PRZED startem.
      if(endWorkMinutes!==null){
        // zapamiętaj końcowy licznik na jutro (jeśli jeszcze nie zapisany)
        if(counterEnd!==null && lastCounterEnd!==counterEnd) lastCounterEnd=counterEnd;
        resetDayAfterExport();
      }
      startWorkMinutes=mins;
      endWorkMinutes=null;
      lastExerciseMinutes = fromEdit ? nowMinutes() : mins;
      resetTimeline();
      document.getElementById('workBtn').classList.add('on');
      workDate = todayISO();
      saveState(); renderAll();
    }
    async function endWork(){
      endWorkMinutes=nowMinutes();
      if(breakActive && currentBreakStart!==null){
        breakSegments.push({ start:currentBreakStart, end:endWorkMinutes });
      }
      breakActive=false; currentBreakStart=null;
      document.getElementById('workBtn').classList.remove('on');
      // zapamiętaj końcowy licznik na jutro
      if(counterEnd!==null) lastCounterEnd=counterEnd;
      saveState(); renderAll();

      // Eksport - dane zostają na ekranie po sukcesie. Reset nastąpi dopiero przy nowym START.
      const url=localStorage.getItem(LS_APPSCRIPT);
      if(url){
        showToast('Eksport...','ok');
        const ok=await doExport(url);
        if(ok){
          showToast('Eksport OK. Dane pozostają na ekranie.','ok');
          saveState(); renderAll();
        } else {
          showToast('Eksport nieudany. Spróbuj ponownie.','err');
        }
      } else {
        showToast('Praca zakończona. URL eksportu nie skonfigurowany.','err');
      }
    }
    function resetDayAfterExport(){
      startWorkMinutes=null; endWorkMinutes=null;
      lastExerciseMinutes=null;
      breakActive=false; currentBreakStart=null;
      breakSegments=[]; exerciseMarkers=[]; breakAdjustMinutes=0;
      workDate=null;
      PROVIDERS.forEach(p=>revenues[p.key]=0);
      counterStart=null; counterEnd=null; privKmTotal=0;
      potUsedToday=false;
    }
    function softReset(){
      // Pełny reset bez eksportu - na potrzeby testowania / przypadkowego uruchomienia
      resetDayAfterExport();
      // Także garnek - jakby był aktywny
      potStartedAt=null; potAckedDone=false;
      saveState(); renderAll();
    }

    async function doExport(url){
      try{
        const km_total = (counterStart!==null && counterEnd!==null) ? (counterEnd-counterStart) : 0;
        const km_zaw = Math.max(0, km_total - privKmTotal);
        const totalInt = Math.floor(getTotalRevenueGroszy()/100);
        const net = getNetWorkMinutes();
        const perHour = net>0 ? Math.round(totalInt*60/net) : 0;
        const perKm = km_zaw>0 ? (totalInt/km_zaw) : 0;

        const payload = {
          date: workDate || todayISO(),
          start: startWorkMinutes!==null?formatHHMM(startWorkMinutes):'',
          end: endWorkMinutes!==null?formatHHMM(endWorkMinutes):'',
          work_duration: minutesToHHMM(Math.max(0,net)),
          break_duration: minutesToHHMM(getTotalBreakMinutes(true)),
          counter_start: counterStart!==null?counterStart:'',
          counter_end: counterEnd!==null?counterEnd:'',
          km_priv: privKmTotal,
          km_zaw: km_zaw,
          uber: (revenues.uber||0)/100,
          bolt: (revenues.bolt||0)/100,
          taxi: (revenues.taxi||0)/100,
          priv: (revenues.priv||0)/100,
          freenow: (revenues.freenow||0)/100,
          agap: (revenues.agap||0)/100,
          tip: (revenues.tip||0)/100,
          other: (revenues.other||0)/100,
          total: totalInt,
          per_hour: perHour,
          per_km: Number(perKm.toFixed(2))
        };
        await fetch(url, {
          method:'POST', mode:'no-cors',
          headers:{ 'Content-Type':'text/plain' },
          body: JSON.stringify(payload)
        });
        return true;
      }catch(e){ return false; }
    }

    function showToast(msg, kind='ok'){
      const t=document.createElement('div');
      t.className=`toast ${kind}`;
      t.textContent=msg;
      document.body.appendChild(t);
      setTimeout(()=>t.remove(), 3500);
    }

    // ===== event listeners =====

    // === Helper: setup long-press na przycisku z akcją 3s + akcja na zwykły click ===
    // - clickAction: krótki klik (uruchomić tylko jeśli długi nie odpalił)
    // - longAction: 3s przytrzymanie
    // - canTrigger: opcjonalna funkcja dopuszczalności (np. nie wchodź w edycję gdy END-confirm)
    function setupLongPress(btn, clickAction, longAction, canTrigger){
      let pressTimer = null;
      let pressStarted = 0;
      let longFired = false;
      let cancelled = false;

      function start(e){
        if(canTrigger && !canTrigger(e)) return;
        if(e && e.target && e.target.closest && e.target.closest('.edit-hint')){ /* hint nie blokuje, jest pointer-events:none, ale zachowawczo */ }
        cancelled = false;
        longFired = false;
        pressStarted = Date.now();
        btn.classList.add('lp-active');
        if(navigator.vibrate){ try{ navigator.vibrate([15]); }catch(e){} }
        pressTimer = setTimeout(()=>{
          if(cancelled) return;
          longFired = true;
          if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
          btn.classList.remove('lp-active');
          longAction();
        }, 3000);
      }
      function endPress(){
        clearTimeout(pressTimer);
        btn.classList.remove('lp-active');
        if(longFired) return;
        if(cancelled) return;
        // krótki klik - uruchom tylko jeśli upłynęło < 3s i nie był to longpress
        clickAction();
      }
      function cancel(){
        cancelled = true;
        clearTimeout(pressTimer);
        btn.classList.remove('lp-active');
      }

      btn.addEventListener('pointerdown', (e)=>{ start(e); });
      btn.addEventListener('pointerup',   (e)=>{ endPress(); });
      btn.addEventListener('pointerleave',(e)=>{ cancel(); });
      btn.addEventListener('pointercancel',(e)=>{ cancel(); });
    }

    // === Animacja END - fala + odliczanie 5s. Może być red (koniec dniówki) lub yellow (reset). ===
    let endConfirmActive = false;
    let endConfirmTimer = null;
    let endConfirmInterval = null;
    let endConfirmAction = null;   // funkcja do wywołania przy potwierdzeniu

    function startEndConfirm(opts){
      if(endConfirmActive) return;
      opts = opts || {};
      const variant = opts.variant || 'red';
      const title = opts.title || 'POTWIERDŹ<br>KONIEC DNIÓWKI';
      const action = opts.action || endWork;
      endConfirmActive = true;
      endConfirmAction = action;

      const ov = document.getElementById('endConfirmOverlay');
      const ctr = document.getElementById('endConfirmCounter');
      const ttl = ov.querySelector('.end-confirm-title');
      ttl.innerHTML = title;
      ov.classList.remove('hidden','yellow');
      if(variant === 'yellow') ov.classList.add('yellow');

      // restart animacji fali (re-trigger)
      const wave = ov.querySelector('.end-wave');
      wave.style.animation='none';
      wave.offsetHeight;
      wave.style.animation='';

      let secs = 5;
      ctr.textContent = secs;
      if(navigator.vibrate){ try{ navigator.vibrate([40,40,40]); }catch(e){} }

      endConfirmInterval = setInterval(()=>{
        secs--;
        if(secs <= 0){
          ctr.textContent = '0';
          cancelEndConfirm({collapse:true});
        } else {
          ctr.textContent = secs;
        }
      }, 1000);

      endConfirmTimer = setTimeout(()=>{
        cancelEndConfirm({collapse:true});
      }, 5000);
    }
    function cancelEndConfirm(opts){
      const collapse = opts && opts.collapse;
      endConfirmActive = false;
      endConfirmAction = null;
      clearTimeout(endConfirmTimer);
      clearInterval(endConfirmInterval);
      const ov = document.getElementById('endConfirmOverlay');
      if(collapse){
        // Zwiń wstecz (animacja), dopiero potem ukryj
        ov.classList.add('collapsing');
        setTimeout(()=>{
          ov.classList.add('hidden');
          ov.classList.remove('yellow','collapsing');
        }, 500);
      } else {
        ov.classList.add('hidden');
        ov.classList.remove('yellow','collapsing');
      }
    }
    function confirmEndAndFinish(){
      const a = endConfirmAction;
      cancelEndConfirm();  // bez collapse - natychmiastowe ukrycie
      if(typeof a === 'function') a();
    }

    // klik w nakładkę = potwierdzenie
    document.getElementById('endConfirmOverlay').addEventListener('click', (e)=>{
      e.stopPropagation();
      confirmEndAndFinish();
    });

    // === Long-press na środku tarczy = soft reset (3s) ===
    // Tworzymy niewidoczną strefę dotykową na środku tarczy
    (function setupClockResetLongPress(){
      const clockWrap = document.querySelector('.clock-wrap');
      if(!clockWrap) return;
      const zone = document.createElement('div');
      zone.id = 'clockResetZone';
      zone.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:18%;height:18%;border-radius:50%;z-index:40;cursor:pointer;background:transparent;';
      clockWrap.appendChild(zone);

      let pressTimer=null, pressStarted=0, longFired=false, cancelled=false;
      function start(){
        if(endConfirmActive) return;  // nie startuj resetu gdy już trwa potwierdzenie
        cancelled=false; longFired=false;
        pressStarted=Date.now();
        if(navigator.vibrate){ try{ navigator.vibrate([15]); }catch(e){} }
        pressTimer=setTimeout(()=>{
          if(cancelled) return;
          longFired=true;
          if(navigator.vibrate){ try{ navigator.vibrate([60,40,60]); }catch(e){} }
          startEndConfirm({
            variant:'yellow',
            title:'POTWIERDŹ<br>RESET',
            action: softReset
          });
        }, 3000);
      }
      function endP(){
        clearTimeout(pressTimer);
      }
      function cancel(){
        cancelled=true;
        clearTimeout(pressTimer);
      }
      zone.addEventListener('pointerdown', start);
      zone.addEventListener('pointerup', endP);
      zone.addEventListener('pointerleave', cancel);
      zone.addEventListener('pointercancel', cancel);
    })();

    // === WORK button ===
    setupLongPress(
      document.getElementById('workBtn'),
      // krótki klik
      ()=>{
        if(endConfirmActive){
          // klik gdy się pokazuje "POTWIERDŹ" → potwierdzenie
          confirmEndAndFinish();
          return;
        }
        if(startWorkMinutes!==null && endWorkMinutes===null){
          // praca trwa - włącz zabezpieczenie zamiast od razu kończyć
          startEndConfirm();
        } else {
          // brak pracy lub już zakończona - start nowej
          setWorkStart(nowMinutes(), false);
        }
      },
      // długi klik 3s = edycja godziny startu
      ()=> openTimeEditor('start')
    );

    // === EXERCISE - bez long-press ===
    document.getElementById('exerciseBtn').addEventListener('click', ()=>{
      if(startWorkMinutes===null || endWorkMinutes!==null) return;
      const now=nowMinutes();
      lastExerciseMinutes=now;
      exerciseMarkers.push(now);
      const b=document.getElementById('exerciseBtn');
      b.classList.remove('alert','blink'); b.classList.add('flash');
      setTimeout(()=>{ b.classList.remove('flash'); renderAll(); }, 2300);
      saveState(); renderAll();
    });

    // === BREAK ===
    setupLongPress(
      document.getElementById('breakBtn'),
      // krótki klik
      ()=>{
        if(startWorkMinutes===null || endWorkMinutes!==null) return;
        const now=nowMinutes();
        if(!breakActive){ breakActive=true; currentBreakStart=now; }
        else {
          breakActive=false;
          if(currentBreakStart!==null) breakSegments.push({ start:currentBreakStart, end:now });
          currentBreakStart=null;
        }
        saveState(); renderAll();
      },
      // długi klik = korekta sumy przerw
      ()=> openTimeEditor('breakAdjust')
    );

    // === POT ===
    setupLongPress(
      document.getElementById('potBtn'),
      // krótki klik
      ()=>{
        if(potStartedAt===null){
          potStartedAt=Date.now();
          potAckedDone=false;
        } else {
          const rem=potRemainingSeconds();
          if(rem>0){
            // przerwanie grzania w trakcie
            potStartedAt=null;
            potAckedDone=false;
          } else {
            // alarm - potwierdzenie wyłączenia grzania
            potAckedDone=true;
          }
        }
        saveState(); renderAll();
      },
      // długi klik = ustaw czas grzania
      ()=> openTimeEditor('pot')
    );

    // === MONEY === (otwarcie panelu obrotów)
    document.getElementById('moneyBtn').addEventListener('click', ()=> openMoneyPanel());
    // === COIN === (też otwiera panel obrotów - to ten sam panel)
    document.getElementById('coinBtn').addEventListener('click', ()=> openMoneyPanel());

    // trick: 3x puk w wersję = konfiguracja URL Apps Script
    let vt=0, vtT=null;
    document.querySelector('.version').addEventListener('click', ()=>{
      vt++;
      clearTimeout(vtT);
      vtT=setTimeout(()=>vt=0, 800);
      if(vt>=3){
        vt=0;
        const cur=localStorage.getItem(LS_APPSCRIPT)||'';
        const v=prompt('URL Google Apps Script (Web App):', cur);
        if(v!==null){
          localStorage.setItem(LS_APPSCRIPT, v.trim());
          showToast(v.trim()?'URL zapisany':'URL wyczyszczony', 'ok');
        }
      }
    });

    // ===== PWA =====
    if('serviceWorker' in navigator){
      window.addEventListener('load', ()=>{
        navigator.serviceWorker.register('sw.js').catch(()=>{});
      });
    }
    let deferredInstallPrompt=null;
    const installBtn=document.getElementById('installBtn');
    window.addEventListener('beforeinstallprompt',(e)=>{
      e.preventDefault();
      deferredInstallPrompt=e;
      installBtn.classList.add('visible');
    });
    installBtn.addEventListener('click', async ()=>{
      if(!deferredInstallPrompt) return;
      installBtn.classList.remove('visible');
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt=null;
    });
    window.addEventListener('appinstalled',()=>{
      installBtn.classList.remove('visible');
      deferredInstallPrompt=null;
    });

    // ===== init =====
    loadState();
    if(startWorkMinutes!==null && endWorkMinutes===null){
      document.getElementById('workBtn').classList.add('on');
    }
    buildDots();
    renderAll();
    // Pierwszy render rolki może paść jeśli clientHeight=0 przed layoutem.
    // Po pierwszej klatce wymuszamy ponowny render dla pewności.
    requestAnimationFrame(()=>{ renderAll(); });

    setInterval(()=>{ blinkState=!blinkState; renderAll(); }, 1000);

    // 100ms: płynna animacja radaru i ognia garnka
    setInterval(()=>{
      if(startWorkMinutes!==null && lastExerciseMinutes!==null && getEffectiveExerciseElapsed()>60){
        renderRadarSweep();
      }
      if(potStartedAt!==null){
        renderPotButton();
      }
    }, 100);

    // auto-save co minutę
    setInterval(()=>saveState(), 60000);
  </script>
</body>
</html>
